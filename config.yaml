app:
  name: go2rtc-manager
  env: production
  box_ip: 192.168.0.10

log:
  level: info

http:
  addr: ":7181"
  read_timeout: 5s
  write_timeout: 15s
  idle_timeout: 60s

go2rtc:
  base_url: http://127.0.0.1:1984
  username: ""
  password: ""
  config_path: /config/go2rtc.yaml
  request_timeout: 10s
  backup_before_change: true

schedule:
  run_on_start: true
  crons:
    - "0 2 * * *"
    - "0 14 * * *"
  confirmation_delay: 3m

action:
  dry_run: false

snapshot:
  storage_dir: storage

record:
  max_duration: 1h
  job_retention: 24h
  max_concurrent_jobs: 3

minio:
  endpoint: localhost:9000
  access_key: minioadmin
  secret_key: minioadmin
  use_ssl: false

mongodb:
  uri: mongodb://localhost:27017
  database: go2rtc_manager
  collection: BODYCAM_INFO

redis:
  addr: ""
  password: ""
  db: 0
  publish_interval: 0s
